kind = "web"
previewPath = "/"
title = "MBC - Main Blood Center"
version = "1.0.0"
id = "artifacts/mbc-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19802

[services.development]
run = "pnpm --filter @workspace/mbc-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mbc-platform", "run", "build" ]
publicDir = "artifacts/mbc-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19802"
BASE_PATH = "/"
